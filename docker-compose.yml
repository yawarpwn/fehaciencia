services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    environment:
      - DATA_PATH=/data
      - MAX_FILE_SIZE_MB=20
    expose:
      - "7780"
    ports:
      - "7780:7780"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:7780/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    expose:
      - "7730"
    ports:
      - "7730:7730"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:7780
      - PORT=7730
      #- ORIGIN=http://localhost:4000
      # 2. Aseguramos también el tamaño máximo del body para Node (25MB en bytes)
      - BODY_SIZE_LIMIT=26214400
