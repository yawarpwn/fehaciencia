services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/data
    environment:
      - DATA_PATH=/data
      - MAX_FILE_SIZE_MB=20
    expose:
      - "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
